# ═══════════════════════════════════════════════════════════
# Kitty Configuration — PAI Terminal Setup
# Nord Light · Commit Mono · Claude Code optimized
# ═══════════════════════════════════════════════════════════

# ─── Remote Control ──────────────────────────────────────
# Required for shell integration and Claude Code compatibility
allow_remote_control  socket-only
listen_on             unix:/tmp/kitty

# ─── Font ─────────────────────────────────────────────────
font_family      Lilex Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto

# Alternatives: Zed Mono Extended, Zed Mono, Commit Mono, Geist Mono

font_size        15.0

# Rendering tweaks to match Zed's look
text_composition_strategy  platform
disable_ligatures cursor

# ─── Nord Light Color Scheme ─────────────────────────────
# Light background with Nord accent colors

# Normal colors
color0  #3b4252
color1  #bf616a
color2  #a3be8c
color3  #d08770
color4  #5e81ac
color5  #b48ead
color6  #88c0d0
color7  #e5e9f0

# Bright colors
color8  #4c566a
color9  #bf616a
color10 #a3be8c
color11 #d08770
color12 #5e81ac
color13 #b48ead
color14 #8fbcbb
color15 #eceff4

# Background & foreground
foreground            #2e3440
background            #eceff4
selection_foreground  #eceff4
selection_background  #5e81ac
cursor                #2e3440
cursor_text_color     #eceff4
url_color             #5e81ac

# ─── Window & Layout ─────────────────────────────────────
# Enable the splits layout (required for vsplit/hsplit `--location` to work).
# Order matters: first item = active default layout.
enabled_layouts       splits,stack

# ─── Persistent session ──────────────────────────────────
# On startup, load the auto-generated session file written by the
# `kitty-session-snapshot` launchd agent (runs every 30s). Falls back
# to a single empty tab if the file doesn't exist.
startup_session       ~/.config/kitty/sessions/last.conf

window_padding_width  8 12
window_margin_width   0
single_window_margin_width -1
remember_window_size  yes
initial_window_width  160c
initial_window_height 48c
placement_strategy    center
hide_window_decorations titlebar-only
confirm_os_window_close -1

# Background opacity (slight transparency for that modern feel)
background_opacity    0.98
dynamic_background_opacity yes

# ─── Tab Bar ─────────────────────────────────────────────
tab_bar_edge          top
tab_bar_style         powerline
tab_powerline_style   slanted
tab_bar_min_tabs      1
tab_bar_margin_width  12.0
tab_title_template    " {index}{activity_symbol}: {title} "
active_tab_foreground   #eceff4
active_tab_background   #5e81ac
active_tab_font_style   bold
inactive_tab_foreground #4c566a
inactive_tab_background #d8dee9
inactive_tab_font_style normal

# ─── Scrollback (Claude Code optimized) ──────────────────
# Large scrollback for long Claude Code sessions
scrollback_lines      50000
scrollback_pager      less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER
scrollback_fill_enlarged_window yes

# ─── Mouse ───────────────────────────────────────────────
copy_on_select        clipboard
strip_trailing_spaces smart
url_style             curly
open_url_with         default
detect_urls           yes

# ─── Clipboard / Paste (Claude Code optimized) ───────────
# Allow pasting large content without bracket paste issues
paste_actions         quote-urls-at-prompt,confirm-if-large

# ─── Bell ────────────────────────────────────────────────
enable_audio_bell     no
visual_bell_duration  0.15
visual_bell_color     #5e81ac
bell_on_tab           "● "
tab_activity_symbol   " ● "

# ─── Shell Integration (zsh) ─────────────────────────────
shell_integration     enabled
allow_hyperlinks      yes

# ─── Performance ─────────────────────────────────────────
repaint_delay         10
input_delay           3
sync_to_monitor       yes

# ─── macOS Specific ──────────────────────────────────────
macos_option_as_alt       yes
macos_quit_when_last_window_closed yes
macos_show_window_title_in none
macos_titlebar_color       #eceff4
macos_thicken_font         0.15

# ─── Keyboard Shortcuts ─────────────────────────────────

# Clear default shortcuts first for clean slate
clear_all_shortcuts   no

# --- Tabs ---
map cmd+t             new_tab_with_cwd
map cmd+w             close_tab
map cmd+1             goto_tab 1
map cmd+2             goto_tab 2
map cmd+3             goto_tab 3
map cmd+4             goto_tab 4
map cmd+5             goto_tab 5
map cmd+6             goto_tab 6
map cmd+7             goto_tab 7
map cmd+8             goto_tab 8
map cmd+9             goto_tab 9
map cmd+option+left   move_tab_backward
map cmd+option+right  move_tab_forward
map ctrl+tab          next_tab
map ctrl+shift+tab    previous_tab

# --- Splits (windows within tab) ---
map cmd+d             launch --cwd=current --location=vsplit
map cmd+shift+d       launch --cwd=current --location=hsplit
map cmd+shift+w       close_window
map cmd+shift+enter   toggle_layout stack

# --- Navigate splits ---
map cmd+left          neighboring_window left
map cmd+right         neighboring_window right
map cmd+up            neighboring_window up
map cmd+down          neighboring_window down

# --- Resize splits ---
map cmd+shift+left    resize_window narrower 3
map cmd+shift+right   resize_window wider 3
map cmd+shift+up      resize_window taller 3
map cmd+shift+down    resize_window shorter 3

# --- Scrolling ---
map cmd+k             scroll_line_up
map cmd+j             scroll_line_down
map cmd+u             scroll_page_up
map cmd+i             scroll_page_down
map cmd+home          scroll_home
map cmd+end           scroll_end
map cmd+shift+k       scroll_to_prompt -1
map cmd+shift+j       scroll_to_prompt 1

# --- Font size ---
map cmd+equal         change_font_size all +1.0
map cmd+minus         change_font_size all -1.0
map cmd+0             change_font_size all 0

# --- Tab merging (pull all tabs into current OS window) ---
map cmd+shift+m     detach_tab ask

# --- Misc ---
map cmd+shift+f       show_scrollback
map cmd+,             edit_config_file
map cmd+shift+r       load_config_file
map cmd+f             launch --type=overlay --stdin-source=@screen_scrollback /usr/bin/less +G -R

# --- Clipboard ---
map cmd+c             copy_to_clipboard
map cmd+v             paste_from_clipboard

# ─── Russian Layout Duplicates ─────────────────────────
# Kitty's keyboard protocol sends Cyrillic codepoints when a
# non-Latin layout is active, so Cmd shortcuts break.
# Mirror every Cmd shortcut above with its Russian-key equivalent.
#
# NOTE 2026-05-25: Hammerspoon (~/.hammerspoon/init.lua) now does this
# at the system level — every app, not just Kitty. Once you've verified
# Hammerspoon is running (status bar icon visible + Accessibility
# permission granted), this whole block can be deleted. Keeping it for
# now as a safety net until Hammerspoon is confirmed working.

# Clipboard
# Russian keys at physical position: C=с, V=м (NOT в, which is on D key!)
map cmd+с             copy_to_clipboard
map cmd+м             paste_from_clipboard

# Tabs
# Russian keys at physical position: T=е, W=ц
map cmd+е             new_tab_with_cwd
map cmd+ц             close_tab

# Splits
# Russian keys at physical position: D=в (in v1 mirrors this was wrongly mapped to д, which is on L key)
# NOTE: shift+Cyrillic produces the *uppercase* Cyrillic char, so we bind both lowercase
# and uppercase variants because Kitty's keybinding parser doesn't normalize case for non-Latin keys.
map cmd+в             launch --cwd=current --location=vsplit
map cmd+shift+в       launch --cwd=current --location=hsplit
map cmd+shift+В       launch --cwd=current --location=hsplit
map cmd+shift+ц       close_window
map cmd+shift+Ц       close_window
map cmd+shift+enter   toggle_layout stack

# Scrolling
# Russian keys at physical position: K=л, J=о, U=г, I=ш
map cmd+л             scroll_line_up
map cmd+о             scroll_line_down
map cmd+г             scroll_page_up
map cmd+ш             scroll_page_down
map cmd+shift+л       scroll_to_prompt -1
map cmd+shift+Л       scroll_to_prompt -1
map cmd+shift+о       scroll_to_prompt 1
map cmd+shift+О       scroll_to_prompt 1

# Font size
map cmd+р             change_font_size all +1.0
map cmd+ь             change_font_size all -1.0

# Misc
map cmd+shift+а       show_scrollback
map cmd+б             edit_config_file
map cmd+shift+р       load_config_file
map cmd+а             launch --type=overlay --stdin-source=@screen_scrollback /usr/bin/less +G -R

# ═══════════════════════════════════════════════════════════
# UX additions (2026-05-24)
# ═══════════════════════════════════════════════════════════

# ─── Quality of life ─────────────────────────────────────
cursor_blink_interval     0
update_check_interval     0

# ─── Useful kittens ──────────────────────────────────────
# Hints — Cmd+Shift+P then type the letter under any URL / path / hash to grab it
map cmd+shift+p           kitten hints
map cmd+shift+o           kitten hints --type=path --program -

# Broadcast input to all panes in current tab
map cmd+shift+b           launch --type=overlay --allow-remote-control kitty +kitten broadcast

# Unicode input by name or codepoint
map cmd+shift+u           kitten unicode_input

# Side-by-side diff of two files
map cmd+shift+e           kitten diff

# ─── Layout + titles ─────────────────────────────────────
# Cycle layouts (you have splits + stack enabled; this rotates between them)
map cmd+l                 next_layout

# Rename current tab and pane
map cmd+shift+t           set_tab_title
map cmd+option+t          set_window_title

# ─── Quick spawns ────────────────────────────────────────
map cmd+shift+y           launch --cwd=current --location=vsplit yazi
map cmd+n                 new_os_window_with_cwd

# ─── Background opacity (live adjust) ────────────────────
map cmd+option+up         set_background_opacity +0.05
map cmd+option+down       set_background_opacity -0.05
map cmd+option+0          set_background_opacity 1.0

# ─── Theme override (last wins) ───────────────────────────
include themes/latte.conf
